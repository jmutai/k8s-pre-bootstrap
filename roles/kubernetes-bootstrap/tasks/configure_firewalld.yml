---
# =============================================
# RedHat: firewalld
# =============================================
- name: Install firewalld (RedHat)
  ansible.builtin.package:
    name: firewalld
    state: present
  when: ansible_os_family == "RedHat"

- name: Start and enable firewalld (RedHat)
  ansible.builtin.service:
    name: firewalld
    state: started
    enabled: yes
  when: ansible_os_family == "RedHat"

- name: Configure firewalld on master nodes (RedHat)
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: yes
    state: enabled
  with_items: '{{ k8s_master_ports }}'
  when:
    - ansible_os_family == "RedHat"
    - "'master' in ansible_hostname"

- name: Configure firewalld on worker nodes (RedHat)
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: yes
    state: enabled
  with_items: '{{ k8s_worker_ports }}'
  when:
    - ansible_os_family == "RedHat"
    - "'node' in ansible_hostname or 'worker' in ansible_hostname"

- name: Open flannel ports on firewalld (RedHat)
  ansible.posix.firewalld:
    port: "{{ item }}/udp"
    permanent: yes
    state: enabled
  with_items: "{{ flannel_udp_ports }}"
  when:
    - ansible_os_family == "RedHat"
    - k8s_cni == "flannel"

- name: Open calico UDP ports on firewalld (RedHat)
  ansible.posix.firewalld:
    port: "{{ item }}/udp"
    permanent: yes
    state: enabled
  with_items: "{{ calico_udp_ports }}"
  when:
    - ansible_os_family == "RedHat"
    - k8s_cni == "calico"

- name: Open calico TCP ports on firewalld (RedHat)
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: yes
    state: enabled
  with_items: "{{ calico_tcp_ports }}"
  when:
    - ansible_os_family == "RedHat"
    - k8s_cni == "calico"

- name: Reload firewalld (RedHat)
  ansible.builtin.command: firewall-cmd --reload
  when: ansible_os_family == "RedHat"

# =============================================
# Debian/Ubuntu: ufw
# =============================================
- name: Install ufw (Debian)
  ansible.builtin.apt:
    name: ufw
    state: present
  when: ansible_os_family == "Debian"

- name: Enable ufw (Debian)
  community.general.ufw:
    state: enabled
    policy: deny
  when: ansible_os_family == "Debian"

- name: Allow SSH on all nodes (Debian)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
  when: ansible_os_family == "Debian"

- name: Open master node TCP ports (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  with_items: '{{ k8s_master_ports }}'
  when:
    - ansible_os_family == "Debian"
    - "'master' in ansible_hostname"

- name: Open worker node TCP ports (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  with_items: '{{ k8s_worker_ports }}'
  when:
    - ansible_os_family == "Debian"
    - "'node' in ansible_hostname or 'worker' in ansible_hostname"

- name: Open flannel UDP ports (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  with_items: "{{ flannel_udp_ports }}"
  when:
    - ansible_os_family == "Debian"
    - k8s_cni == "flannel"

- name: Open calico UDP ports (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: udp
  with_items: "{{ calico_udp_ports }}"
  when:
    - ansible_os_family == "Debian"
    - k8s_cni == "calico"

- name: Open calico TCP ports (Debian)
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  with_items: "{{ calico_tcp_ports }}"
  when:
    - ansible_os_family == "Debian"
    - k8s_cni == "calico"

- name: Reload ufw (Debian)
  community.general.ufw:
    state: reloaded
  when: ansible_os_family == "Debian"
